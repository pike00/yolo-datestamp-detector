services:
  rotation-detect:
    image: ghcr.io/astral-sh/uv:python3.14-bookworm
    working_dir: /workspace
    command: ["uv", "run", "detect_rotation.py", "originals", "--skip-existing", "--batch-size", "200"]
    env_file:
      - .env.rotation
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: dedup
      DB_USER: dedup
      DB_PASSWORD: dedup_local_dev
      UV_CACHE_DIR: /uv-cache
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./detect_rotation.py:/workspace/detect_rotation.py:ro
      - ./models:/workspace/models:ro
      - ./originals:/workspace/originals:ro
      - uv-cache:/uv-cache
    networks:
      - dedup_default

volumes:
  uv-cache:

networks:
  dedup_default:
    external: true
