<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Annotate</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f23;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #status-bar {
    background: #16213e;
    padding: 6px 16px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }
  #status-bar .labeled { color: #4ade80; }
  #status-bar .skipped { color: #fbbf24; }

  #canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    padding: 8px;
  }
  canvas {
    max-width: 100%;
    max-height: 100%;
    cursor: crosshair;
  }

  .box-type {
    font-size: 12px;
    margin-top: 5px;
    padding: 5px;
    border-radius: 4px;
  }

  .box-type.model {
    background-color: #ffd700;
    color: #333;
  }

  .box-type.user {
    background-color: #00aa00;
    color: white;
  }

  #shortcut-bar {
    background: #16213e;
    padding: 6px 16px;
    font-size: 11px;
    color: #a0a0b0;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    border-top: 1px solid #333;
    flex-shrink: 0;
  }

  #button-bar {
    background: #16213e;
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    border-top: 1px solid #333;
    flex-shrink: 0;
  }
  button {
    background: #2a2a4a;
    color: #e0e0e0;
    border: 1px solid #444;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  button:active {
    background: #3a3a5a;
  }
  button.primary {
    background: #00aa44;
    color: #fff;
    border-color: #00ff88;
  }
  button.warning {
    background: #aa8800;
    border-color: #ffcc00;
  }

  #draw-mode {
    position: fixed;
    bottom: 120px;
    right: 16px;
    background: #2a2a4a;
    padding: 8px 12px;
    border-radius: 4px;
    border: 1px solid #00ff88;
    color: #00ff88;
    font-size: 12px;
    pointer-events: none;
  }
  kbd {
    background: #2a2a4a;
    padding: 1px 5px;
    border-radius: 3px;
    color: #e0e0e0;
    border: 1px solid #444;
    font-family: inherit;
  }
  .confirm { color: #4ade80; }
  .skip-label { color: #fbbf24; }

  #done-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 15, 35, 0.95);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-size: 20px;
    gap: 16px;
  }
  #done-overlay.visible { display: flex; }
</style>
</head>
<body>

<div id="status-bar">
  <span id="filename">Loading...</span>
  <span id="progress"></span>
  <span class="labeled" id="labeled-count"></span>
  <span class="skipped" id="skipped-count"></span>
</div>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<div id="button-bar">
  <button id="btn-reset" class="primary">🔄 Reset Box</button>
  <button id="btn-confirm" class="primary">✓ Confirm (Enter)</button>
  <button id="btn-skip" class="warning">⊘ Skip (S)</button>
  <button id="btn-back">← Back (Z)</button>
</div>

<div id="shortcut-bar">
  <span><kbd>Tap image</kbd> Draw box (2 taps: corner 1 → corner 2)</span>
  <span><kbd>Drag corners</kbd> Adjust box</span>
  <span><kbd>Enter</kbd> <span class="confirm">Confirm</span></span>
  <span><kbd>S</kbd> <span class="skip-label">Skip</span></span>
  <span><kbd>Z</kbd> Back</span>
  <span><kbd>R</kbd> Reset</span>
</div>

<div id="draw-mode">Tap image to draw</div>

<div id="done-overlay">
  <div id="done-title">All images processed!</div>
  <div id="done-stats"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let state = null;       // server state
let img = null;         // current Image object
let imgW = 0, imgH = 0; // natural image dimensions

// Box in normalized coords [0,1] relative to image (center + size)
let box = { x: 0.4, y: 0.45, w: 0.2, h: 0.1 };

const COARSE = 20; // px
const FINE = 3;    // px

// Touch/stylus drawing state
let drawMode = false;
let cornerCount = 0;
let corner1 = null;
let draggingCorner = null;

async function loadState() {
  const resp = await fetch('/api/state');
  state = await resp.json();
  box = { ...state.last_box };
  loadCurrentImage();
}

function loadCurrentImage() {
  if (state.current_index >= state.total) {
    showDone();
    return;
  }

  const filename = state.images[state.current_index];
  updateStatus(filename);

  img = new Image();
  img.onload = () => {
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    resizeCanvas();
    draw();
  };
  img.src = '/photos/' + filename;
}

function resizeCanvas() {
  const container = document.getElementById('canvas-container');
  const maxW = container.clientWidth - 16;
  const maxH = container.clientHeight - 16;

  const scale = Math.min(maxW / imgW, maxH / imgH);
  canvas.width = Math.floor(imgW * scale);
  canvas.height = Math.floor(imgH * scale);
}

function draw() {
  if (!img) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  // Determine box color based on source
  const isModelPrediction = box.model_confidence !== undefined;
  const boxColor = isModelPrediction ? '#FFD700' : '#00FF00';  // Yellow for model, green for user
  const lineWidth = isModelPrediction ? 3 : 2;

  // Draw bounding box
  const bx = (box.x - box.w / 2) * canvas.width;
  const by = (box.y - box.h / 2) * canvas.height;
  const bw = box.w * canvas.width;
  const bh = box.h * canvas.height;

  ctx.strokeStyle = boxColor;
  ctx.lineWidth = lineWidth;
  ctx.strokeRect(bx, by, bw, bh);

  // Semi-transparent fill
  if (isModelPrediction) {
    ctx.fillStyle = 'rgba(255, 215, 0, 0.08)';
  } else {
    ctx.fillStyle = 'rgba(0, 255, 0, 0.08)';
  }
  ctx.fillRect(bx, by, bw, bh);

  // Corner handles
  var hs = 8;
  ctx.fillStyle = boxColor;
  ctx.fillRect(bx - hs/2, by - hs/2, hs, hs);
  ctx.fillRect(bx + bw - hs/2, by - hs/2, hs, hs);
  ctx.fillRect(bx - hs/2, by + bh - hs/2, hs, hs);
  ctx.fillRect(bx + bw - hs/2, by + bh - hs/2, hs, hs);

  // Show confidence if model prediction
  if (isModelPrediction) {
    const conf = box.model_confidence;
    ctx.fillStyle = '#FFD700';
    ctx.font = '14px monospace';
    ctx.fillText('Model: ' + (conf * 100).toFixed(0) + '%', 10, 30);
  }
}

function updateStatus(filename) {
  const mode = state.mode === 'correct' ? '(CORRECT MODE)' : '';
  document.getElementById('filename').textContent = (filename || '') + ' ' + mode;
  document.getElementById('progress').textContent =
    (state.current_index + 1) + ' / ' + state.total;
  document.getElementById('labeled-count').textContent =
    state.labeled.length + ' labeled';
  document.getElementById('skipped-count').textContent =
    state.skipped.length + ' skipped';
}

function showDone() {
  document.getElementById('done-overlay').classList.add('visible');
  document.getElementById('done-stats').textContent =
    state.labeled.length + ' labeled, ' + state.skipped.length + ' skipped';
}

async function confirmLabel() {
  const filename = state.images[state.current_index];
  const nextIndex = state.current_index + 1;

  await fetch('/api/label', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename, box, next_index: nextIndex }),
  });

  if (!state.labeled.includes(filename)) state.labeled.push(filename);
  state.skipped = state.skipped.filter(function(f) { return f !== filename; });
  state.current_index = nextIndex;
  state.last_box = { x: box.x, y: box.y, w: box.w, h: box.h };
  loadCurrentImage();
}

async function skipImage() {
  const filename = state.images[state.current_index];
  const nextIndex = state.current_index + 1;

  await fetch('/api/skip', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename, next_index: nextIndex }),
  });

  if (!state.skipped.includes(filename)) state.skipped.push(filename);
  state.labeled = state.labeled.filter(function(f) { return f !== filename; });
  state.current_index = nextIndex;
  loadCurrentImage();
}

function goBack() {
  if (state.current_index <= 0) return;
  state.current_index--;

  fetch('/api/goto', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: state.current_index }),
  }).then(function() { loadCurrentImage(); });
}

function resetBox() {
  box = { x: 0.5, y: 0.5, w: 0.2, h: 0.1 };
  draw();
}

// Shift+arrow: move the edge in that direction
// e.g. Shift+Left moves the left edge left, Shift+Right moves the right edge right
function moveEdge(direction, step) {
  var x1 = box.x - box.w / 2;
  var y1 = box.y - box.h / 2;
  var x2 = box.x + box.w / 2;
  var y2 = box.y + box.h / 2;

  if (direction === 'left')  x1 = Math.max(0, Math.min(x2 - 0.02, x1 - step));
  if (direction === 'right') x2 = Math.min(1, Math.max(x1 + 0.02, x2 + step));
  if (direction === 'up')    y1 = Math.max(0, Math.min(y2 - 0.02, y1 - step));
  if (direction === 'down')  y2 = Math.min(1, Math.max(y1 + 0.02, y2 + step));

  box.w = x2 - x1;
  box.h = y2 - y1;
  box.x = (x1 + x2) / 2;
  box.y = (y1 + y2) / 2;
}

function moveBox(dx, dy) {
  box.x = Math.min(1 - box.w / 2, Math.max(box.w / 2, box.x + dx));
  box.y = Math.min(1 - box.h / 2, Math.max(box.h / 2, box.y + dy));
}

// Touch/Stylus Canvas Events - Drag-to-define box
let isDrawing = false;

canvas.addEventListener('pointerdown', function(e) {
  if (!img) return;

  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / canvas.width;
  const y = (e.clientY - rect.top) / canvas.height;

  // Check if clicking on an existing corner handle to adjust
  const bx = (box.x - box.w / 2);
  const by = (box.y - box.h / 2);
  const bx2 = bx + box.w;
  const by2 = by + box.h;
  const threshold = 0.04;

  if (Math.abs(x - bx) < threshold && Math.abs(y - by) < threshold) {
    draggingCorner = 'tl';
  } else if (Math.abs(x - bx2) < threshold && Math.abs(y - by) < threshold) {
    draggingCorner = 'tr';
  } else if (Math.abs(x - bx) < threshold && Math.abs(y - by2) < threshold) {
    draggingCorner = 'bl';
  } else if (Math.abs(x - bx2) < threshold && Math.abs(y - by2) < threshold) {
    draggingCorner = 'br';
  } else {
    // Start new box: tap-drag-release to define corners
    corner1 = { x, y };
    isDrawing = true;
    document.getElementById('draw-mode').textContent = 'Dragging... release to finish';
  }

  e.preventDefault();
});

canvas.addEventListener('pointermove', function(e) {
  if (!img) return;

  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / canvas.width;
  const y = (e.clientY - rect.top) / canvas.height;

  // If adjusting existing corner
  if (draggingCorner) {
    let x1 = box.x - box.w / 2;
    let y1 = box.y - box.h / 2;
    let x2 = box.x + box.w / 2;
    let y2 = box.y + box.h / 2;

    if (draggingCorner === 'tl') { x1 = x; y1 = y; }
    else if (draggingCorner === 'tr') { x2 = x; y1 = y; }
    else if (draggingCorner === 'bl') { x1 = x; y2 = y; }
    else if (draggingCorner === 'br') { x2 = x; y2 = y; }

    x1 = Math.max(0, Math.min(x1, 1));
    y1 = Math.max(0, Math.min(y1, 1));
    x2 = Math.max(0, Math.min(x2, 1));
    y2 = Math.max(0, Math.min(y2, 1));

    if (x2 - x1 > 0.02 && y2 - y1 > 0.02) {
      box.w = x2 - x1;
      box.h = y2 - y1;
      box.x = (x1 + x2) / 2;
      box.y = (y1 + y2) / 2;
      draw();
    }
  }
  // If drawing new box
  else if (isDrawing && corner1) {
    let x1 = Math.min(corner1.x, x);
    let y1 = Math.min(corner1.y, y);
    let x2 = Math.max(corner1.x, x);
    let y2 = Math.max(corner1.y, y);

    box.w = x2 - x1;
    box.h = y2 - y1;
    box.x = (x1 + x2) / 2;
    box.y = (y1 + y2) / 2;
    draw();
  }

  e.preventDefault();
});

canvas.addEventListener('pointerup', function() {
  if (isDrawing) {
    isDrawing = false;
    corner1 = null;
    document.getElementById('draw-mode').textContent = 'Box drawn. Drag corners to adjust, then confirm →';
  }
  draggingCorner = null;
});

// Button handlers
document.getElementById('btn-confirm').addEventListener('click', confirmLabel);
document.getElementById('btn-skip').addEventListener('click', skipImage);
document.getElementById('btn-back').addEventListener('click', goBack);
document.getElementById('btn-reset').addEventListener('click', resetBox);

document.addEventListener('keydown', function(e) {
  if (state && state.current_index >= state.total) return;

  var step = e.shiftKey ? FINE : COARSE;

  switch (e.key) {
    case 'ArrowLeft':
      e.preventDefault();
      if (e.shiftKey) { moveEdge('left', FINE / imgW); }
      else if (e.altKey) { moveEdge('right', -FINE / imgW); }
      else { moveBox(-COARSE / imgW, 0); }
      draw();
      break;
    case 'ArrowRight':
      e.preventDefault();
      if (e.shiftKey) { moveEdge('right', FINE / imgW); }
      else if (e.altKey) { moveEdge('left', -FINE / imgW); }
      else { moveBox(COARSE / imgW, 0); }
      draw();
      break;
    case 'ArrowUp':
      e.preventDefault();
      if (e.shiftKey) { moveEdge('up', FINE / imgH); }
      else if (e.altKey) { moveEdge('down', -FINE / imgH); }
      else { moveBox(0, -COARSE / imgH); }
      draw();
      break;
    case 'ArrowDown':
      e.preventDefault();
      if (e.shiftKey) { moveEdge('down', FINE / imgH); }
      else if (e.altKey) { moveEdge('up', -FINE / imgH); }
      else { moveBox(0, COARSE / imgH); }
      draw();
      break;
    case 'Enter':
      e.preventDefault();
      confirmLabel();
      break;
    case 's':
    case 'S':
      skipImage();
      break;
    case 'z':
    case 'Z':
      goBack();
      break;
    case 'r':
    case 'R':
      resetBox();
      break;
    case 'q':
    case 'Q':
      fetch('/api/goto', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ index: state.current_index }),
      }).then(function() {
        document.body.textContent = '';
        var msg = document.createElement('div');
        msg.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100vh;font-size:20px;color:#e0e0e0;';
        msg.textContent = 'Progress saved. You can close this tab.';
        document.body.appendChild(msg);
      });
      break;
  }
});

// Auto-resize canvas on window resize
window.addEventListener('resize', function() {
  if (img && imgW) {
    resizeCanvas();
    draw();
  }
});

// Start
loadState();
</script>
</body>
</html>
